name: Build and scan Chatwoot image

# Builds the Chatwoot container image from the pinned upstream release tag held
# in our fork, scans it with Trivy, and publishes it to GHCR. Manual trigger so
# builds are deliberate; the tag to build is an input (defaults to the pinned
# release). Never builds a moving branch (decision D4).
#
# After a successful push, the pipeline closes the GitOps loop: it commits the
# new tag to helm/chatwoot/values.yaml on main, and Argo CD rolls it out. In a
# multi-environment setup the production bump would go through a gated PR
# instead of a direct commit.

on:
  workflow_dispatch:
    inputs:
      chatwoot_ref:
        description: "Chatwoot git tag to build"
        required: true
        default: "v4.15.1"

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.img.outputs.ref }}
      image: ${{ steps.img.outputs.image }}
    steps:
      - name: Compute image reference
        id: img
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR paths must be lowercase
          echo "ref=${{ github.event.inputs.chatwoot_ref }}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/chatwoot" >> "$GITHUB_OUTPUT"

      # Checked out so the SARIF upload has this repo's commit as its git context.
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Checkout Chatwoot source (fork, pinned tag)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/chatwoot
          ref: ${{ steps.img.outputs.ref }}
          path: chatwoot-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load into runner for scanning)
        uses: docker/build-push-action@v6
        with:
          context: chatwoot-src
          file: chatwoot-src/docker/Dockerfile
          load: true
          tags: ${{ steps.img.outputs.image }}:${{ steps.img.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (human-readable, report-only)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.img.outputs.image }}:${{ steps.img.outputs.ref }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Push image to GHCR
        run: docker push "${{ steps.img.outputs.image }}:${{ steps.img.outputs.ref }}"

      - name: Trivy scan (SARIF for the Security tab)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.img.outputs.image }}:${{ steps.img.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  # GitOps write-back: record the freshly pushed image tag in Git so Argo CD
  # (auto-sync) deploys it. Runs only after the image is in GHCR. Both
  # workflows in this repo are workflow_dispatch-only, so this commit cannot
  # retrigger a build.
  bump-tag:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in Helm values
        id: bump
        env:
          REF: ${{ needs.build.outputs.ref }}
        run: |
          current="$(sed -n 's/^  tag: //p' helm/chatwoot/values.yaml)"
          if [ "$current" = "$REF" ]; then
            echo "values.yaml already at ${REF}; nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sed -i "s|^  tag: .*|  tag: ${REF}|" helm/chatwoot/values.yaml
          grep -qx "  tag: ${REF}" helm/chatwoot/values.yaml  # fail loudly if the edit missed
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push the bump
        if: steps.bump.outputs.changed == 'true'
        env:
          REF: ${{ needs.build.outputs.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898062+github-actions[bot]@users.noreply.github.com"
          git add helm/chatwoot/values.yaml
          git commit -m "Bump Chatwoot image tag to ${REF}"
          git pull --rebase origin main
          git push origin main
