apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chatwoot.fullname" . }}-migrate
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Under Argo CD this runs as a Sync hook at wave 1: after PostgreSQL/Redis
    # (wave 0) are healthy and before web/Sidekiq (wave 2). BeforeHookCreation
    # deletes the prior job so re-syncs and image bumps are not blocked by Job
    # immutability. Under plain `helm`/`kubectl` these annotations are ignored
    # and ordering is provided by the pod init containers instead.
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
    "argocd.argoproj.io/sync-wave": "1"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "chatwoot.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command: ["sh", "-c", "until pg_isready -h {{ include "chatwoot.postgresHost" . }} -U {{ .Values.postgres.username }} -q; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]
          envFrom:
            - configMapRef:
                name: {{ include "chatwoot.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret }}
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
