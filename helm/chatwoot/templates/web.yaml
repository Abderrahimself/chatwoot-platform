apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatwoot.webHost" . }}
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatwoot.webHost" . }}
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "chatwoot.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      initContainers:
        {{- include "chatwoot.waitForDeps" . | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Upstream rails entrypoint (waits for pg, clears stale pid) + server.
          command: ["docker/entrypoints/rails.sh"]
          args: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
          envFrom:
            - configMapRef:
                name: {{ include "chatwoot.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /app/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "chatwoot.fullname" . }}-storage
