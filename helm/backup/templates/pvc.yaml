apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "backup.fullname" . }}-archive
  labels:
    {{- include "backup.labels" . | nindent 4 }}
    app.kubernetes.io/component: archive
  annotations:
    # Argo CD prunes what leaves Git. Backups are the one thing that must not
    # disappear because a manifest was deleted or an application removed.
    argocd.argoproj.io/sync-options: Delete=false
    helm.sh/resource-policy: keep
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.storage.size }}
