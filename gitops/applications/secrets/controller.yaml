apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Upstream Helm chart, pinned (chart 2.19.1 = controller v0.38.4).
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.19.1
    helm:
      values: |
        # Default name kubeseal expects; keeps the CLI zero-config.
        fullnameOverride: sealed-secrets-controller
        resources:
          requests:
            cpu: 30m
            memory: 64Mi
          limits:
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
