apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Abderrahimself/chatwoot-platform.git
    targetRevision: main
    # SealedSecret manifests: encrypted with the cluster controller's public
    # key, safe to keep in Git. Only the in-cluster controller can decrypt.
    path: gitops/secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: chatwoot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
