apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chatwoot
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # The platform repo is public, so Argo CD clones it without credentials.
    repoURL: https://github.com/Abderrahimself/chatwoot-platform.git
    targetRevision: main
    path: helm/chatwoot
  destination:
    server: https://kubernetes.default.svc
    namespace: chatwoot
  syncPolicy:
    automated:
      prune: true      # remove resources deleted from Git
      selfHeal: true   # revert manual drift in the cluster
    syncOptions:
      - CreateNamespace=true
