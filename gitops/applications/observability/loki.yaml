apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Upstream chart, pinned (chart 7.1.0 = Loki 3.6.8). Single-binary mode
    # with filesystem storage — right-sized for one node.
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.1.0
    helm:
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          limits_config:
            retention_period: 48h
          compactor:
            retention_enabled: true
            delete_request_store: filesystem

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: local-path
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi

        # Zero out the scalable-mode components; single binary serves it all.
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        gateway:
          enabled: false

        # The default memcached caches alone would claim ~1 GB on this node.
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

        lokiCanary:
          enabled: false
        test:
          enabled: false
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
