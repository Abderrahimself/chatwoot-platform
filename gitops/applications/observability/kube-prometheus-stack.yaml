apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Upstream chart, pinned (chart 87.17.0 = prometheus-operator v0.92.1).
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.17.0
    helm:
      values: |
        # Trimmed for a single 7 GB node: one replica of everything, short
        # retention, explicit requests/limits.

        prometheus:
          prometheusSpec:
            retention: 24h
            # Pick up ServiceMonitors/PodMonitors/Rules from any namespace
            # without requiring the Helm release label.
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 1Gi

        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi

        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.observability.svc:3100
            - name: Tempo
              type: tempo
              access: proxy
              url: http://tempo.observability.svc:3200
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - grafana.10.17.3.165.nip.io
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi

        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi

        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        prometheus-node-exporter:
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi

        # k3s embeds these control-plane components in the k3s binary; their
        # separate metrics endpoints are not exposed, so the scrapes and the
        # matching down-alerts would only produce noise.
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        defaultRules:
          rules:
            etcd: false
            kubeControllerManager: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            kubeProxy: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The Prometheus CRDs exceed the client-side annotation size limit.
      - ServerSideApply=true
