[defaults]
inventory = inventory/
remote_user = abdo
private_key_file = ~/.ssh/id_ed25519
host_key_checking = False
interpreter_python = auto_silent
result_format = yaml
retry_files_enabled = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=10
